<app-auth-layout>

  <div class="login">
    <header class="login-header">
      <h2 class="login-title">Bienvenido de vuelta</h2>
      <p class="login-subtitle">Iniciá sesión para acceder a tu cuenta</p>
    </header>

    <form class="login-form" (ngSubmit)="onLogin()" #loginForm="ngForm">

      <!-- Usuario -->
      <div class="form-group">
        <label class="form-label" for="user">Usuario</label>
        <div class="input-wrapper">
          <span class="input-prefix">&#64;</span>
          <input
            id="user"
            type="text"
            class="form-input form-input-with-prefix"
            [ngModel]="user()"
            (ngModelChange)="user.set($event)"
            name="user"
            placeholder="tu_usuario"
            autocomplete="username"
            autocapitalize="off"
            [disabled]="loading()"
            required
          />
        </div>
      </div>

      <!-- PIN -->
      <div class="form-group">
        <label class="form-label" for="pin">PIN</label>
        <div class="input-wrapper">
          <input
            id="pin"
            [type]="showPin() ? 'text' : 'password'"
            class="form-input form-input-with-suffix"
            [ngModel]="pin()"
            (ngModelChange)="pin.set($event)"
            name="pin"
            placeholder="••••"
            autocomplete="current-password"
            inputmode="numeric"
            [disabled]="loading()"
            required
          />
          <button
            type="button"
            class="input-suffix-btn"
            (click)="togglePin()"
            [disabled]="loading()"
            [attr.aria-label]="showPin() ? 'Ocultar PIN' : 'Mostrar PIN'"
          >
            {{ showPin() ? 'Ocultar' : 'Mostrar' }}
          </button>
        </div>
      </div>

      <!-- Submit -->
      <button
        type="submit"
        class="btn btn-primary btn-full"
        [disabled]="loading()"
      >
        @if (loading()) {
          Iniciando sesión…
        } @else {
          Iniciar sesión
        }
      </button>

    </form>

    <footer class="login-footer">
      <p class="login-footer-text">
        ¿No tenés cuenta?
        <a routerLink="/register" class="login-footer-link">Crear nueva cuenta</a>
      </p>
    </footer>

  </div>

</app-auth-layout>
