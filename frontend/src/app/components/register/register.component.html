<app-auth-layout>

  <div class="register">
    <header class="register-header">
      <h2 class="register-title">Creá tu cuenta</h2>
      <p class="register-subtitle">Abrí tu cuenta en M.H.M Bank en menos de un minuto</p>
    </header>

    <form class="register-form" (ngSubmit)="onRegister()" #registerForm="ngForm">

      <!-- Usuario -->
      <div class="form-group">
        <label class="form-label" for="user">Usuario</label>
        <div class="input-wrapper">
          <span class="input-prefix">&#64;</span>
          <input
            id="user"
            type="text"
            class="form-input form-input-with-prefix"
            [ngModel]="user()"
            (ngModelChange)="user.set($event)"
            name="user"
            placeholder="elegí_tu_usuario"
            autocomplete="username"
            autocapitalize="off"
            [disabled]="loading()"
            required
          />
        </div>
        <p class="form-hint">Solo letras, números y guiones bajos.</p>
      </div>

      <!-- PIN -->
      <div class="form-group">
        <label class="form-label" for="pin">PIN</label>
        <div class="input-wrapper">
          <input
            id="pin"
            [type]="showPin() ? 'text' : 'password'"
            class="form-input form-input-with-suffix"
            [ngModel]="pin()"
            (ngModelChange)="pin.set($event)"
            name="pin"
            placeholder="••••"
            autocomplete="new-password"
            inputmode="numeric"
            [disabled]="loading()"
            required
          />
          <button
            type="button"
            class="input-suffix-btn"
            (click)="togglePin()"
            [disabled]="loading()"
            [attr.aria-label]="showPin() ? 'Ocultar PIN' : 'Mostrar PIN'"
          >
            {{ showPin() ? 'Ocultar' : 'Mostrar' }}
          </button>
        </div>
        <p class="form-hint">Elegí un PIN que recuerdes — no lo vas a poder recuperar.</p>
      </div>

      <!-- Balance inicial -->
      <div class="form-group">
        <label class="form-label" for="balance">Saldo inicial</label>
        <div class="input-wrapper">
          <span class="input-prefix">$</span>
          <input
            id="balance"
            type="number"
            class="form-input form-input-with-prefix"
            [ngModel]="initialBalance()"
            (ngModelChange)="initialBalance.set($event)"
            name="balance"
            placeholder="0.00"
            min="0"
            step="0.01"
            [disabled]="loading()"
          />
        </div>
        <p class="form-hint">Es solo para empezar a probar la app. Lo podés modificar después.</p>
      </div>

      <!-- Submit -->
      <button
        type="submit"
        class="btn btn-primary btn-full"
        [disabled]="loading()"
      >
        @if (loading()) {
          Creando cuenta…
        } @else {
          Crear cuenta
        }
      </button>

    </form>

    <footer class="register-footer">
      <p class="register-footer-text">
        ¿Ya tenés cuenta?
        <a routerLink="/login" class="register-footer-link">Iniciar sesión</a>
      </p>
    </footer>

  </div>

</app-auth-layout>
